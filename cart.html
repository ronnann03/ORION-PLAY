<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Orion Play</title>
    <!-- Tailwind CSS (CDN for demonstration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-gamepad"></i> Orion Play
            </a>
            <a href="products.html" class="hover:text-indigo-200 transition">Volver a la Tienda</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold mb-6">Tu Carrito de Compras</h1>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <!-- Cart Item -->
            <div class="p-6 border-b border-gray-200 flex flex-col sm:flex-row items-center gap-4">
                <img src="assets/images/game1.jpg" alt="Cyber Battle 2077" class="w-24 h-24 object-cover rounded">
                <div class="flex-grow text-center sm:text-left">
                    <h2 class="text-xl font-semibold">Cyber Battle 2077</h2>
                    <p class="text-gray-500">PC, Digital</p>
                </div>
                <div class="text-xl font-bold text-indigo-600">S/ 229.00</div>
                <button class="text-red-500 hover:text-red-700 p-2"><i class="fas fa-trash"></i></button>
            </div>

            <!-- Cart Summary -->
            <div class="p-6 bg-gray-50 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="text-lg">
                    Total a pagar: <span class="text-2xl font-bold text-gray-900">S/ 229.00</span>
                </div>
                <a href="checkout.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-md font-semibold transition-colors duration-300 w-full sm:w-auto text-center">
                    Proceder al Checkout
                </a>
            </div>
        </div>
    </main>

</body>
</html>
