<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Cooll Play</title>
    <!-- Tailwind CSS (CDN for demonstration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 text-center">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">
                <i class="fas fa-gamepad"></i> Cooll Play
            </a>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6 border-b border-gray-200 bg-indigo-50">
                <h2 class="text-2xl font-bold text-indigo-900">Finalizar Compra</h2>
                <p class="text-indigo-700">Total: S/ 229.00</p>
            </div>
            
            <form class="p-6 space-y-6" action="index.html">
                <!-- Payment Details -->
                <div>
                    <h3 class="text-lg font-semibold border-b pb-2 mb-4">Detalles de Pago</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre en la Tarjeta</label>
                            <input type="text" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Juan Pérez" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Número de Tarjeta</label>
                            <input type="text" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="0000 0000 0000 0000" required>
                        </div>
                        <div class="flex gap-4">
                            <div class="w-1/2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Vencimiento</label>
                                <input type="text" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="MM/YY" required>
                            </div>
                            <div class="w-1/2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">CVC</label>
                                <input type="text" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="123" required>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-md transition duration-300 ease-in-out transform hover:-translate-y-1 hover:shadow-lg">
                    Confirmar y Pagar S/ 229.00
                </button>
            </form>
        </div>
    </main>

</body>
</html>
