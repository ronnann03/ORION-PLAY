<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario | Orion Play</title>
    <!-- CSS Compilado desde LESS -->
    <link rel="stylesheet" href="../css/main-less.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Navbar único de Orion Play (idéntico en todas las páginas) -->
    <link rel="stylesheet" href="../css/orion-theme.css">
</head>
<body>

    <!-- Navbar único (idéntico en las 8 páginas) -->
    <header class="op-nav">
        <a href="../index.html" class="op-nav__brand"><span class="orion-mark" aria-hidden="true"></span> Orion Play</a>
        <nav class="op-nav__links">
            <a href="../index.html" class="op-nav__link">Inicio</a>

    <div class="profile-container">
        <div class="profile-card">
            <div class="header">

                <span class="orion-mark" aria-hidden="true"></span>

            <div class="stats">
                <div class="stat-item">
                    <h3>15</h3>
                    <span>Juegos Comprados</span>
                </div>
                <div class="stat-item">
                    <h3>1,240</h3>
                    <span>Horas Jugadas</span>
                </div>
                <div class="stat-item">
                    <h3>8</h3>
                    <span>Logros Platino</span>
                </div>
