<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Orion Play</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Tipografía de marca -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <!-- Tema visual Orion Play -->
    <link rel="stylesheet" href="../css/orion-theme.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            font-family: var(--op-font-body);
            background-image:
                linear-gradient(rgba(6, 8, 18, 0.85), rgba(6, 8, 18, 0.92)),
                url('../assets/images/hero-bg.jpg');
            background-size: cover;
            background-position: center;
        }
        main {
            flex: 1 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(15, 20, 40, 0.75) !important;
            border: 1px solid var(--op-space-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--op-starlight);
        }
        .login-card .card-title,
        .login-card h1, .login-card h2 { font-family: var(--op-font-display); }
        .login-card .indigo-text { color: var(--op-nova-bright) !important; }
        .login-card .grey-text { color: var(--op-starlight-dim) !important; }
        .login-card label { color: var(--op-starlight-dim); }
        .login-card input { color: var(--op-starlight); }
        .login-card .input-field input:focus + label { color: var(--op-nova-bright) !important; }
        .login-card .input-field input:focus { border-bottom-color: var(--op-nova) !important; box-shadow: 0 1px 0 0 var(--op-nova) !important; }
        .login-card .btn.indigo { background-color: var(--op-nova) !important; }
        .login-card .btn.indigo:hover { background-color: var(--op-nova-bright) !important; }
        .login-card a { color: var(--op-nova-bright); }
    </style>
</head>
<body>

    <!-- Navbar único (idéntico en las 8 páginas) -->
    <header class="op-nav">
        <a href="../index.html" class="op-nav__brand"><span class="orion-mark" aria-hidden="true"></span> Orion Play</a>
        <nav class="op-nav__links">
            <a href="../index.html" class="op-nav__link">Inicio</a>
            <a href="../bootstrap/products.html" class="op-nav__link">Tienda</a>
            <a href="../tailwind/cart.html" class="op-nav__link">Carrito</a>
            <a href="login.html" class="op-nav__link is-active">Ingresar</a>
            <a href="../mdb/register.html" class="op-nav__link">Registro</a>
        </nav>
    </header>

    <main>
        <div class="card login-card z-depth-3">
            <div class="card-content">
                <span class="card-title center-align">
                    <i class="material-icons large indigo-text">videogame_asset</i><br>
                    <b>Orion Play</b> <span class="orion-mark" aria-hidden="true"></span>
                </span>
                <p class="center-align grey-text mb-4">Inicia sesión en tu cuenta</p>

                <form action="../index.html">
                    <div class="row">
                        <div class="input-field col s12">
                            <i class="material-icons prefix">account_circle</i>
                            <input id="email" type="email" class="validate" required>
                            <label for="email">Correo Electrónico</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <i class="material-icons prefix">lock</i>
                            <input id="password" type="password" class="validate" required>
                            <label for="password">Contraseña</label>
                        </div>
                    </div>

                    <div class="row center-align">
                        <button class="btn waves-effect waves-light indigo" type="submit" name="action">Entrar
                            <i class="material-icons right">send</i>
                        </button>
                    </div>

                    <div class="center-align">
                        <a href="../mdb/register.html">¿No tienes cuenta? Regístrate</a><br>
                        <a href="../index.html" class="grey-text">Volver a la tienda</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            M.updateTextFields();
        });
    </script>
</body>
</html>
