<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Orion Play</title>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
    <!-- MDB UI Kit (Material Design for Bootstrap) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.2.0/mdb.min.css" rel="stylesheet"/>
    <!-- Tipografía de marca -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Tema visual Orion Play -->
    <link rel="stylesheet" href="../css/orion-theme.css">
    <style>
        .bg-image-custom {
            background-image:
                linear-gradient(rgba(6, 8, 18, 0.55), rgba(6, 8, 18, 0.75)),
                url('../assets/images/register-bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .glass-card {
            background: rgba(15, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--op-space-border);
            color: var(--op-starlight);
        }
        .glass-card h2 { font-family: var(--op-font-display); }
        .glass-card .text-primary { color: var(--op-nova-bright) !important; }
        .glass-card .text-muted { color: var(--op-starlight-dim) !important; }
        .glass-card a { color: var(--op-nova-bright); }
        .glass-card .form-control { background-color: rgba(255, 255, 255, 0.06); color: var(--op-starlight); border-color: var(--op-space-border); }
        .glass-card .form-control:focus { border-color: var(--op-nova); box-shadow: 0 0 0 0.2rem rgba(124, 92, 252, 0.25); background-color: rgba(255, 255, 255, 0.08); color: var(--op-starlight); }
        .glass-card .form-label { color: var(--op-starlight-dim); }
        .glass-card .btn-primary { background-color: var(--op-nova); border-color: var(--op-nova); }
        .glass-card .btn-primary:hover { background-color: var(--op-nova-bright); border-color: var(--op-nova-bright); }
        .vh-nav { min-height: calc(100vh - var(--op-nav-height)); }
    </style>
</head>
<body>

<!-- Navbar único (idéntico en las 8 páginas) -->
<header class="op-nav">
    <a href="../index.html" class="op-nav__brand"><span class="orion-mark" aria-hidden="true"></span> Orion Play</a>
    <nav class="op-nav__links">
        <a href="../index.html" class="op-nav__link">Inicio</a>
        <a href="../bootstrap/products.html" class="op-nav__link">Tienda</a>
        <a href="../tailwind/cart.html" class="op-nav__link">Carrito</a>
        <a href="../materialize/login.html" class="op-nav__link">Ingresar</a>
        <a href="register.html" class="op-nav__link is-active">Registro</a>
    </nav>
</header>

<!-- Section: Design Block -->
<section class="text-center text-lg-start bg-image-custom vh-nav d-flex align-items-center">
  <div class="container py-4">
    <div class="row g-0 align-items-center">
      <div class="col-lg-6 mb-5 mb-lg-0 mx-auto">
        <div class="card cascading-right glass-card">
          <div class="card-body p-5 shadow-5 text-center">

            <h2 class="fw-bold mb-5 text-primary"><i class="fas fa-gamepad"></i> Únete a Orion Play <span class="orion-mark" aria-hidden="true"></span></h2>
            <form action="../less/profile.html">
              <!-- 2 column grid layout with text inputs for the first and last names -->
              <div class="row">
                <div class="col-md-6 mb-4">
                  <div class="form-outline" data-mdb-input-init>
                    <input type="text" id="form3Example1" class="form-control" required/>
                    <label class="form-label" for="form3Example1">Nombre</label>
                  </div>
                </div>
                <div class="col-md-6 mb-4">
                  <div class="form-outline" data-mdb-input-init>
                    <input type="text" id="form3Example2" class="form-control" required/>
                    <label class="form-label" for="form3Example2">Apellido</label>
                  </div>
                </div>
              </div>

              <!-- Email input -->
              <div class="form-outline mb-4" data-mdb-input-init>
                <input type="email" id="form3Example3" class="form-control" required/>
                <label class="form-label" for="form3Example3">Correo Electrónico</label>
              </div>

              <!-- Password input -->
              <div class="form-outline mb-4" data-mdb-input-init>
                <input type="password" id="form3Example4" class="form-control" required/>
                <label class="form-label" for="form3Example4">Contraseña</label>
              </div>

              <!-- Submit button -->
              <button type="submit" class="btn btn-primary btn-block mb-4" data-mdb-ripple-init>
                Registrarse
              </button>

              <div class="text-center">
                <p>¿Ya tienes cuenta? <a href="../materialize/login.html">Inicia sesión</a></p>
                <p><a href="../index.html" class="text-muted">Volver al Inicio</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- MDB -->
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.2.0/mdb.umd.min.js"></script>
</body>
</html>
