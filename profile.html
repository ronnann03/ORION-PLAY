<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario | Orion Play</title>
    <!-- CSS Compilado desde LESS -->
    <link rel="stylesheet" href="css/main-less.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="profile-container">
        <a href="index.html" style="color: #6366f1; text-decoration: none; margin-bottom: 20px; display: inline-block;">&larr; Volver al Inicio</a>
        
        <div class="profile-card">
            <div class="header">
                <img src="assets/images/avatar.png" alt="Avatar">
                <h2>Ronaldinhoo</h2>
                <p>Miembro Platino - Nivel 42</p>
                <button class="btn-edit" style="margin-top: 15px;">Editar Perfil</button>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <h3>15</h3>
                    <span>Juegos Comprados</span>
                </div>
                <div class="stat-item">
                    <h3>1,240</h3>
                    <span>Horas Jugadas</span>
                </div>
                <div class="stat-item">
                    <h3>8</h3>
                    <span>Logros Platino</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
